<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<title>lumic OG image source</title>
<style>
:root {
  --bg-card:      #eeedfd;     /* PRIMARY_SOFT — same pale-indigo as the business-card front */
  --text-strong:  #0f172a;
  --muted:        #64748b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 1200px; height: 630px;
  background: var(--bg-card);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
}

.stage {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
}

/* Wordmark — render the canonical brand-kit SVG (~/projects/playbook/
   brand/logos/wordmark.svg, copied to /wordmark.svg) so the orb sits
   exactly where the brand-kit math placed it. Aspect ratio 312:121. */
.brand-svg {
  width: 720px;
  height: auto;
  display: block;
}

/* Pull the tagline up into the SVG's empty bottom canvas so the visible
   gap from the wordmark baseline to the tagline matches the business-card
   front (~18px proportional). The brand wordmark.svg has ~14 units of empty
   canvas below baseline that scales to ~32px at this render size. */
.tagline { text-align: center; margin-top: -36px; }
.tagline .l1 { display: block; font-size: 44px; font-weight: 600; color: var(--text-strong); letter-spacing: -.4px; }
.tagline .l2 { display: block; font-size: 36px; font-weight: 400; color: var(--muted); letter-spacing: -.2px; margin-top: 8px; }
</style>
</head>
<body>
  <div class="stage">
    <img class="brand-svg" src="./wordmark.svg" alt="lumic">
    <div class="tagline">
      <span class="l1">Custom dashboards + AI agents,</span>
      <span class="l2">on the tools your business already uses.</span>
    </div>
  </div>
</body>
</html>
