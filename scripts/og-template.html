<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<title>lumic OG image source</title>
<style>
:root {
  --bg:           #f6f7fb;
  --bg-2:         #eef1f8;
  --muted:        #64748b;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 1200px; height: 630px;
  background: linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
}

.stage {
  width: 100%; height: 100%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
}

/* Wordmark — render the canonical brand-kit SVG (~/projects/playbook/
   brand/logos/wordmark.svg, copied to /wordmark.svg) so the orb sits
   exactly where the brand-kit math placed it. Aspect ratio 312:121. */
.brand-svg {
  width: 720px;
  height: auto;
  display: block;
}

.tagline {
  margin-top: 32px;
  font-size: 44px; font-weight: 400;
  color: var(--muted);
  letter-spacing: -.2px;
}

.url {
  position: absolute;
  bottom: 56px; left: 0; right: 0;
  text-align: center;
  font-size: 22px; font-weight: 400;
  color: var(--muted);
  letter-spacing: .4px;
}
</style>
</head>
<body>
  <div class="stage">
    <img class="brand-svg" src="./wordmark.svg" alt="lumic">
    <div class="tagline">Your business, in your hands.</div>
    <div class="url">get-lumic.com</div>
  </div>
</body>
</html>
