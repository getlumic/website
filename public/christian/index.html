<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Christian Gonzenbach — lumic</title>
<link rel="icon" href="/favicon.svg">
<style>
:root {
  --bg:           #f6f7fb;
  --card:         #ffffff;
  --border:       #e2e8f0;
  --text:         #1e293b;
  --text-strong:  #0f172a;
  --muted:        #64748b;
  --primary:      #5e5ce6;
  --primary-2:    #4845c2;
  --primary-soft: #eeedfd;
  --shadow-lg:    0 4px 14px rgba(15, 23, 42, 0.07), 0 24px 48px rgba(15, 23, 42, 0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); min-height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
  display: flex; align-items: center; justify-content: center;
  padding: 24px; min-height: 100vh;
}
.card {
  background: var(--card); border: 1px solid var(--border); border-radius: 20px;
  box-shadow: var(--shadow-lg); padding: 40px 32px 32px; width: 100%; max-width: 380px;
  text-align: center;
}
.avatar {
  width: 96px; height: 96px; border-radius: 50%; object-fit: cover;
  border: 3px solid var(--primary-soft); margin-bottom: 18px;
}
h1 { font-size: 24px; font-weight: 700; color: var(--text-strong); letter-spacing: -0.4px; }
.role { font-size: 15px; color: var(--muted); margin-top: 4px; margin-bottom: 26px; }
.role .brand { color: var(--primary); font-weight: 600; }
.actions { display: flex; flex-direction: column; gap: 10px; }
.btn {
  display: block; text-decoration: none; font-size: 15px; font-weight: 600;
  padding: 13px 16px; border-radius: 12px; transition: background .15s ease;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-2); }
.btn-secondary { background: var(--primary-soft); color: var(--primary-2); }
.btn-secondary:hover { background: #e2e0fb; }
.tagline { margin-top: 26px; font-size: 12.5px; color: var(--muted); }
.wordmark { margin-top: 10px; font-size: 20px; font-weight: 700; letter-spacing: -0.5px; color: var(--text-strong); position: relative; display: inline-block; }
.wordmark .dot { position: absolute; top: -1px; right: -9px; width: 6px; height: 6px; border-radius: 50%; background: var(--primary); }
</style>
</head>
<body>
  <main class="card">
    <img class="avatar" src="/img/founders/christian.jpg" alt="Christian Gonzenbach">
    <h1>Christian Gonzenbach</h1>
    <p class="role">Co-founder, <span class="brand">lumic</span></p>
    <div class="actions">
      <a class="btn btn-primary" href="/christian.vcf" download>Save contact</a>
      <a class="btn btn-secondary" href="https://get-lumic.com">Visit get-lumic.com</a>
      <a class="btn btn-secondary" href="mailto:hello@get-lumic.com?subject=Following%20up%20from%20tonight">Email us</a>
    </div>
    <p class="tagline">Custom dashboards + AI agents on the ERP your business already runs.</p>
    <div class="wordmark">lumic<span class="dot"></span></div>
  </main>
</body>
</html>
